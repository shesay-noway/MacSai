name: CI

# Build + test on PRs (and on demand). We deliberately do NOT run on push to
# main: main is the product of already-tested PRs, and the Release workflow
# re-tests before it signs and notarizes a tag. This avoids a redundant build
# on every merge.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Verify VERSION ↔ MCConstants.appVersion sync
        run: bash scripts/check-version-sync.sh

      - name: Build
        run: swift build

      - name: Run Tests (XCTest with code coverage)
        run: swift test --enable-code-coverage

      - name: Sanity-check coverage report exists
        run: |
          PROF=$(find .build -name '*.profdata' | head -1)
          if [ -z "$PROF" ]; then
            echo "::error::No coverage profile found — coverage instrumentation may have broken"
            exit 1
          fi
          echo "Coverage profile: $PROF"

      - name: Smoke test for safety-critical files
        run: |
          # Verify the safety-critical files exist and have substantial test coverage.
          # This is a heuristic guard: if SafetyGuard.swift or PlistJunkFilter.swift
          # disappear, or if their tests vanish, this step fails loudly.
          test -f Sources/MacCleanKit/SafetyGuard.swift || { echo "::error::SafetyGuard.swift missing"; exit 1; }
          test -f Sources/MacCleanKit/PlistJunkFilter.swift || { echo "::error::PlistJunkFilter.swift missing"; exit 1; }
          test -f Tests/MacCleanKitTests/SafetyGuardTests.swift || { echo "::error::SafetyGuard tests missing"; exit 1; }
          test -f Tests/MacCleanKitTests/PlistJunkFilterTests.swift || { echo "::error::PlistJunkFilter tests missing"; exit 1; }
          test -f Tests/MacCleanTests/CleaningEngineTests.swift || { echo "::error::CleaningEngine tests missing"; exit 1; }
          echo "All safety-critical test files present."

  security-audit:
    name: Security Audit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "password\|secret\|api_key\|token" Sources/ --include="*.swift" | grep -v "//\|Password\|password:\|\.password\|kSecAttr\|SecItem\|Keychain\|saved passwords"; then
            echo "::warning::Potential secrets found in source code"
            exit 1
          fi
          echo "No secrets found."

      - name: Check SafetyGuard integrity
        run: |
          echo "Verifying SafetyGuard protections..."
          grep -c "protectedPaths\|isProtected\|safePrefixes" Sources/MacCleanKit/SafetyGuard.swift
          UNSAFE=$(grep -rn "removeItem\|trashItem" Sources/MacClean/ --include="*.swift" | grep -v "SafetyGuard\|CleaningEngine\|SecureEraser\|MaintenanceModule\|UninstallerView\|dryRun\|// " | grep -v "Test" || true)
          if [ -n "$UNSAFE" ]; then
            echo "::warning::File deletion found outside SafetyGuard/CleaningEngine/Shredder:"
            echo "$UNSAFE"
          fi
          echo "SafetyGuard checks passed."

      - name: Verify no telemetry
        run: |
          echo "Verifying zero network calls..."
          NETWORK=$(grep -rnE "URLSession|NSURLConnection|URLRequest" Sources/MacCleanKit Sources/MacClean/Modules Sources/MacClean/Core --include="*.swift" | grep -v "// " | grep -v "URLSession.shared.data" || true)
          # Note: UpdaterModule uses URLSession to fetch Sparkle appcasts. That's user-initiated only.
          if echo "$NETWORK" | grep -v "UpdaterModule.swift" | grep -q "URLSession"; then
            echo "::warning::Unexpected network usage detected:"
            echo "$NETWORK"
          fi
          echo "Network audit done — only UpdaterModule should fetch appcasts."
