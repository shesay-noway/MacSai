name: Verify signing secrets

# Read-only check that the signing + notarization secrets actually work.
# Imports the Developer ID cert, confirms it matches APPLE_DEVELOPER_ID, and
# makes one authenticated notarytool call. Builds nothing, releases nothing,
# and tears the keychain down afterwards. Run it from the Actions tab before
# trusting a real release.
on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Developer ID + notary credentials
    runs-on: macos-15
    steps:
      - name: Import Developer ID certificate
        env:
          DEVID_CERT_P12_BASE64: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          DEVID_CERT_PASSWORD: ${{ secrets.DEVID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/devid.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/verify.keychain-db"
          echo -n "$DEVID_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')
          security import "$CERT_PATH" -P "$DEVID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          rm -f "$CERT_PATH"

      - name: Confirm signing identity matches APPLE_DEVELOPER_ID
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          security find-identity -v -p codesigning
          if security find-identity -v -p codesigning | grep -qF "$APPLE_DEVELOPER_ID"; then
            echo "OK: APPLE_DEVELOPER_ID matches an imported Developer ID identity"
          else
            echo "::error::APPLE_DEVELOPER_ID does not match any imported identity"
            exit 1
          fi

      - name: Verify notary credentials (authenticated, no submission)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/asc_key.p8"
          echo -n "$ASC_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"
          xcrun notarytool store-credentials "MacSai" \
            --key "$KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --keychain "$RUNNER_TEMP/verify.keychain-db"
          rm -f "$KEY_PATH"
          # `history` is a real authenticated API call; it succeeds only if the
          # key id, issuer, and .p8 are all valid.
          xcrun notarytool history --keychain-profile "MacSai" | head -20
          echo "OK: notary credentials authenticated"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/verify.keychain-db" || true
